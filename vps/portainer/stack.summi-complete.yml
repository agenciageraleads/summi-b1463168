version: "3.8"

services:
  summi-frontend:
    image: ghcr.io/agenciageraleads/summi-b1463168-frontend:62965367bc67c553c14cc70c4bc06f67abe82d1a
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - Portainer
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=1
        - traefik.http.routers.summi-frontend.rule=Host(`${SUMMI_FRONTEND_HOST}`)
        - traefik.http.routers.summi-frontend.entrypoints=websecure
        - traefik.http.routers.summi-frontend.priority=1
        - traefik.http.routers.summi-frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.summi-frontend.service=summi-frontend
        - traefik.http.services.summi-frontend.loadbalancer.server.port=80
        - traefik.http.services.summi-frontend.loadbalancer.passHostHeader=true

  summi-worker-api:
    image: ghcr.io/agenciageraleads/summi-b1463168-worker:3dfda79a4c114e575fd6cb22adb0c333afe840ed
    command: ["uvicorn", "summi_worker.app:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "1"]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 8080), 5); s.close()"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_TRANSCRIPTION_MODEL=${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      - OPENAI_TRANSCRIPTION_FALLBACK_MODEL=${OPENAI_TRANSCRIPTION_FALLBACK_MODEL:-gpt-4o-transcribe}
      - OPENAI_TRANSCRIPTION_LANGUAGE=${OPENAI_TRANSCRIPTION_LANGUAGE:-pt}
      - OPENAI_TRANSCRIPTION_PROMPT_EXTRA=${OPENAI_TRANSCRIPTION_PROMPT_EXTRA:-CNPJ, CPF, orcamento, pedido, nota fiscal, codigo do produto, prazo de entrega, DeWalt, Makita, Bosch, Stanley, Milwaukee}
      - OPENAI_TRANSCRIPTION_ENABLE_FALLBACK=${OPENAI_TRANSCRIPTION_ENABLE_FALLBACK:-true}
      - OPENAI_TRANSCRIPTION_CONFIDENCE_THRESHOLD=${OPENAI_TRANSCRIPTION_CONFIDENCE_THRESHOLD:-0.65}
      - OPENAI_TRANSCRIPTION_CRITICAL_CONFIDENCE_THRESHOLD=${OPENAI_TRANSCRIPTION_CRITICAL_CONFIDENCE_THRESHOLD:-0.80}
      - OPENAI_TRANSCRIPTION_CHUNKING_MIN_SECONDS=${OPENAI_TRANSCRIPTION_CHUNKING_MIN_SECONDS:-20}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SUMMI_SENDER_INSTANCE=${SUMMI_SENDER_INSTANCE}
      - BUSINESS_HOURS_START=${BUSINESS_HOURS_START}
      - BUSINESS_HOURS_END=${BUSINESS_HOURS_END}
      - IGNORE_REMOTE_JID=${IGNORE_REMOTE_JID}
      - REDIS_URL=${REDIS_URL:-}
      - REQUIRE_REDIS=${REQUIRE_REDIS:-true}
      - WEBHOOK_DEDUPE_TTL_SECONDS=${WEBHOOK_DEDUPE_TTL_SECONDS:-86400}
      - ENABLE_ANALYSIS_QUEUE=${ENABLE_ANALYSIS_QUEUE:-false}
      - ENABLE_SUMMARY_QUEUE=${ENABLE_SUMMARY_QUEUE:-false}
      - QUEUE_ANALYSIS_NAME=${QUEUE_ANALYSIS_NAME:-summi:queue:analysis}
      - QUEUE_SUMMARY_NAME=${QUEUE_SUMMARY_NAME:-summi:queue:summary}
      - ENABLE_IMAGE_DESCRIPTION=${ENABLE_IMAGE_DESCRIPTION:-false}
      - ENABLE_SUMMI_AUDIO=${ENABLE_SUMMI_AUDIO:-false}
      - DEFAULT_SECONDS_TO_SUMMARIZE=${DEFAULT_SECONDS_TO_SUMMARIZE:-90}
      - PAID_AI_SOFT_CAP_BRL=${PAID_AI_SOFT_CAP_BRL:-4.0}
      - PAID_AI_HARD_CAP_BRL=${PAID_AI_HARD_CAP_BRL:-5.0}
      - TRIAL_AI_SOFT_CAP_BRL=${TRIAL_AI_SOFT_CAP_BRL:-1.0}
      - TRIAL_AI_HARD_CAP_BRL=${TRIAL_AI_HARD_CAP_BRL:-1.5}
      - USD_BRL_EXCHANGE_RATE=${USD_BRL_EXCHANGE_RATE:-5.8}
      - ENABLE_HOURLY_JOB=false
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - SITE_URL=${SITE_URL:-https://summi.gera-leads.com}
    networks:
      - Portainer
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=1
        - traefik.http.routers.summi-worker.rule=Host(`${SUMMI_WORKER_HOST}`)
        - traefik.http.routers.summi-worker.entrypoints=websecure
        - traefik.http.routers.summi-worker.priority=1
        - traefik.http.routers.summi-worker.tls.certresolver=letsencryptresolver
        - traefik.http.routers.summi-worker.service=summi-worker
        - traefik.http.services.summi-worker.loadbalancer.server.port=8080
        - traefik.http.services.summi-worker.loadbalancer.passHostHeader=true

