      - TRIAL_AI_HARD_CAP_BRL=${TRIAL_AI_HARD_CAP_BRL:-1.5}
      - USD_BRL_EXCHANGE_RATE=${USD_BRL_EXCHANGE_RATE:-5.8}
      - ENABLE_HOURLY_JOB=true
      - ENABLE_DAILY_JOB=${ENABLE_DAILY_JOB:-false}
      - DAILY_SUMMARY_HOUR_UTC=${DAILY_SUMMARY_HOUR_UTC:-22}
      - DAILY_SUMMARY_TIMEZONE=${DAILY_SUMMARY_TIMEZONE:-UTC}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - BLOG_AUTO_POST_ENABLED=${BLOG_AUTO_POST_ENABLED:-false}
