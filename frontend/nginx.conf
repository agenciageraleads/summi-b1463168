map $http_user_agent $is_social_bot {
  default                   0;
  "~*WhatsApp"              1;
  "~*facebookexternalhit"   1;
  "~*Facebot"               1;
  "~*Twitterbot"            1;
  "~*TelegramBot"           1;
  "~*LinkedInBot"           1;
  "~*Slackbot"              1;
  "~*Discordbot"            1;
  "~*Pinterest"             1;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker internal DNS (needed for proxy_pass with service names)
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Block common sensitive files/paths
  location ~ /\.(?!well-known).* {
    access_log off;
    return 404;
  }

  location ~* ^/(server-status|info\.php)$ {
    access_log off;
    return 404;
  }

  # Static assets cache
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Blog post routes: social bots get og-tag HTML from worker; browsers get React SPA
  location ~ ^/blog/([^/]+)$ {
    if ($is_social_bot) {
      rewrite ^/blog/(.+)$ /social/blog/$1 break;
      proxy_pass http://summi-worker-api:8080;
    }
    try_files $uri $uri/ /index.html;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
